apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "user-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "user-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "user-service.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "user-service.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
{{- with .Values.podAnnotations }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      containers:
        - name: user-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              value: "{{ .Values.env.databaseUrl }}"
            - name: JWT_ISSUER
              value: "{{ .Values.env.jwtIssuer }}"
            - name: JWT_AUDIENCE
              value: "{{ .Values.env.jwtAudience }}"
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "{{ .Values.env.accessTokenExpiryMinutes | quote }}"
            - name: JWT_SECRET
              value: "{{ .Values.env.jwtSecret }}"
            - name: DEFAULT_USER_USERNAME
              value: "{{ .Values.env.defaultUser.username }}"
            - name: DEFAULT_USER_PASSWORD
              value: "{{ .Values.env.defaultUser.password }}"
          resources:
{{- toYaml .Values.resources | nindent 12 }}

