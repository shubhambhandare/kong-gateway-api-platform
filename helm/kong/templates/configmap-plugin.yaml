apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kong.fullname" . }}-plugin
data:
  handler.lua: |-
    local kong = kong

    local CustomHandler = {
      VERSION = "1.0.0",
      PRIORITY = 900,
    }

    function CustomHandler:access(conf)
      if conf.header_name and conf.header_value then
        kong.service.request.set_header(conf.header_name, conf.header_value)
      end

      kong.log.info(string.format(
        "[custom-plugin] method=%s path=%s client_ip=%s",
        kong.request.get_method(),
        kong.request.get_path(),
        kong.client.get_ip()
      ))
    end

    return CustomHandler

  schema.lua: |-
    local typedefs = require "kong.db.schema.typedefs"

    return {
      name = "custom",
      fields = {
        { consumer = typedefs.no_consumer },
        { protocols = typedefs.protocols_http },
        { config = {
            type = "record",
            fields = {
              { header_name = { type = "string", required = true, default = "X-Platform" }, },
              { header_value = { type = "string", required = true, default = "internal-api" }, },
            },
          },
        },
      },
    }

